<div class="shell">
  <header class="top-bar">
    <a routerLink="/devices" class="brand">Device management</a>
    <div class="spacer"></div>
    @if (storage.session(); as session) {
      <span class="user-pill" [attr.title]="session.user.email">
        {{ session.user.name }}
      </span>
      <button type="button" class="ghost" (click)="logout()">Sign out</button>
    }
  </header>
  <main class="main">
    <router-outlet />
  </main>
</div>
