<div class="auth-page">
  <div class="auth-card">
    <h1>Create account</h1>
    <p class="muted">Register with email and password.</p>

    @if (errorMessage(); as err) {
      <div class="alert" role="alert">{{ err }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="email" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <span class="field-error">Valid email is required.</span>
        }
      </label>

      <label class="field">
        <span>Password</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="new-password"
        />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <span class="field-error">
            Password is required (min {{ minPasswordLength }} characters).
          </span>
        }
      </label>

      <button
        type="submit"
        class="dm-btn dm-btn--primary auth-submit"
        [disabled]="submitting()"
      >
        {{ submitting() ? 'Creating account…' : 'Register' }}
      </button>
    </form>

    <p class="footer-link">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
